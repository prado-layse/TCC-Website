spring.application.name=HoqueiBrasil

# Configuração do Banco de Dados em um serviço gerenciado na nuvem
spring.datasource.url=jdbc:postgresql://<hostname>:<port>/<database>
spring.datasource.username=<username>
spring.datasource.password=<password>

# Configurações de JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configurações do Spring Cloud (se aplicável)
spring.cloud.config.uri=http://<config-server-url>